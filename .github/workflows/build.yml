name: Build & Release

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  build-linux:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Install rpmbuild (for RPM maker)
        run: sudo apt-get update && sudo apt-get install -y rpm
      - run: npm run make
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: out/make/

  build-windows:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run make
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: out/make/

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate build information
        id: build-info
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s" -n 10 > changelog.md
      - uses: actions/download-artifact@v4
        with:
          name: linux-packages
      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
      - name: Prepare release assets
        run: |
          VERSION="${{ steps.build-info.outputs.version }}"
          mkdir -p release
          cp linux-packages/deb/x64/*.deb "release/Turcanime-${VERSION}-linux-x64.deb"
          cp linux-packages/rpm/x64/*.rpm "release/Turcanime-${VERSION}-linux-x64.rpm"
          cp windows-installer/squirrel.windows/x64/*.exe "release/Turcanime-${VERSION}-win-x64-setup.exe"
      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Turcanime v${{ steps.build-info.outputs.version }}"
          tag_name: "v${{ steps.build-info.outputs.version }}"
          files: release/*
          body_path: changelog.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
